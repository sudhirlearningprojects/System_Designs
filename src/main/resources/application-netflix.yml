server:
  port: 8098

spring:
  application:
    name: netflix-streaming-service
  
  data:
    cassandra:
      keyspace-name: netflix
      contact-points: localhost
      port: 9042
      local-datacenter: datacenter1
      
  redis:
    host: localhost
    port: 6379
    timeout: 2000ms
    
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3

netflix:
  streaming:
    chunk-size: 1MB
    supported-qualities: 
      - SD_360
      - SD_480
      - HD_720
      - HD_1080
      - UHD_4K
  recommendation:
    cache-ttl: 3600
    max-recommendations: 20
  analytics:
    batch-size: 1000
    flush-interval: 30s
  cdn:
    regions:
      - US-EAST
      - US-WEST
      - EU
      - ASIA
  chaos:
    enabled: false
    failure-rate: 0.01
    latency-rate: 0.05

logging:
  level:
    org.sudhir512kj.netflix: DEBUG
    org.springframework.data.cassandra: INFO
    org.springframework.kafka: INFO