server:
  port: 8088

spring:
  profiles:
    active: ratelimiter
  application:
    name: rate-limiter-service
  
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    timeout: 2000ms
    lettuce:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 5
  
  cache:
    type: redis
    redis:
      time-to-live: 300000 # 5 minutes

logging:
  level:
    org.sudhir512kj.ratelimiter: DEBUG
    org.springframework.data.redis: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

rate-limiter:
  enabled: true