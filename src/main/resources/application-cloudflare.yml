server:
  port: 8094

spring:
  application:
    name: cloudflare-clone
  
  datasource:
    url: jdbc:postgresql://localhost:5432/cloudflare_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5

logging:
  level:
    org.sudhir512kj.cloudflare: INFO
    org.springframework.web: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

# Cloudflare specific configuration
cloudflare:
  edge:
    location: "US-EAST-1"
    cache:
      max-size: 1000000
      ttl-seconds: 3600
  security:
    ddos:
      rate-limit: 100
      window-seconds: 60
    waf:
      enabled: true
      default-action: "ALLOW"