spring:
  application:
    name: digital-payment-platform
  
  datasource:
    url: jdbc:postgresql://localhost:5432/digitalpayment
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    timeout: 2000ms

server:
  port: 8084

payment:
  fraud-detection:
    daily-limit: 100000
    hourly-transaction-limit: 50
  
  idempotency:
    cache-duration: 24 # hours

logging:
  level:
    org.sudhir512kj.digitalpayment: INFO